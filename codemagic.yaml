workflows:
  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: linux_x2

    scripts:
      - name: Check project
        script: |
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          pwd
          ls -la
          ls -la app
          java -version
          uname -a

      - name: Install Gradle 9.3.1
        script: |
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          curl -L https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -o /tmp/gradle-9.3.1-bin.zip
          unzip -q /tmp/gradle-9.3.1-bin.zip -d /tmp
          export PATH="/tmp/gradle-9.3.1/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          gradle --version

      - name: Create debug keystore
        script: |
          export PATH="/tmp/gradle-9.3.1/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -la debug.keystore

      - name: Build debug APK
        script: |
          export PATH="/tmp/gradle-9.3.1/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          gradle clean assembleDebug --no-daemon --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab
      - app/build/reports/**/*
